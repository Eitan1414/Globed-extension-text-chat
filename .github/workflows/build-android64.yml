name: Build Android64 Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build-android64:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Android64
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          build-config: Release

      - name: Upload Android64 build
        uses: actions/upload-artifact@v4
        with:
          name: Globed-Text-Chat-Android64
          path: |
            build/**/*.geode
            build/**/*.so
            build/**/*.zip
