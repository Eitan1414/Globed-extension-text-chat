name: Build Android64 Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build-android64:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find or extract mod project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository files:"
          find . -maxdepth 4 -type f | sort

          MOD_JSON="$(find . -maxdepth 5 -name mod.json -not -path './geode-sdk-clone/*' | head -n 1 || true)"
          if [ -n "$MOD_JSON" ]; then
            MOD_DIR="$(dirname "$MOD_JSON")"
            echo "Found mod.json in: $MOD_DIR"
            echo "path=$MOD_DIR" >> "$GITHUB_OUTPUT"
            echo "mod_json=$MOD_JSON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE="$(find . -maxdepth 3 -type f -name '*.zip' | head -n 1 || true)"
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No mod.json found and no .zip project found."
            exit 1
          fi

          echo "No mod.json found directly. Extracting: $ZIP_FILE"
          rm -rf extracted-project
          mkdir -p extracted-project
          unzip -q "$ZIP_FILE" -d extracted-project

          MOD_JSON="$(find extracted-project -maxdepth 6 -name mod.json | head -n 1 || true)"
          if [ -z "$MOD_JSON" ]; then
            echo "::error::The .zip was extracted, but no mod.json was found inside it."
            exit 1
          fi

          MOD_DIR="$(dirname "$MOD_JSON")"
          echo "Found mod.json after extraction in: $MOD_DIR"
          echo "path=$MOD_DIR" >> "$GITHUB_OUTPUT"
          echo "mod_json=$MOD_JSON" >> "$GITHUB_OUTPUT"

      - name: Fix mod.json Geode version format
        shell: bash
        run: |
          set -euo pipefail
          MOD_JSON="${{ steps.project.outputs.mod_json }}"
          echo "Patching $MOD_JSON"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["MOD_JSON"])
          data = json.loads(path.read_text(encoding="utf-8"))

          data["geode"] = "5.7.1"

          if isinstance(data.get("version"), str):
              data["version"] = data["version"].lstrip("v")

          deps = data.get("dependencies", {})
          if isinstance(deps, dict):
              for key, value in list(deps.items()):
                  if isinstance(value, str):
                      deps[key] = value.replace(">=v", ">=")

          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          print(path.read_text(encoding="utf-8"))
          PY
        env:
          MOD_JSON: ${{ steps.project.outputs.mod_json }}

      - name: Build Android64
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          build-config: Release
          sdk: 5.7.1
          path: ${{ steps.project.outputs.path }}

      - name: Upload Android64 build
        uses: actions/upload-artifact@v4
        with:
          name: Globed-Text-Chat-Android64
          if-no-files-found: error
          path: |
            ${{ steps.project.outputs.path }}/build/**/*.geode
            ${{ steps.project.outputs.path }}/build/**/*.so
            ${{ steps.project.outputs.path }}/build/**/*.zip
